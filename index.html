<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      font-family: Arial;
    }

    .box {
      text-align: center;
      color: white;
    }

    h1 {
      font-size: 60px;
      animation: glow 1s infinite alternate;
    }

    p {
      font-size: 22px;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px white; }
      to { text-shadow: 0 0 30px red; }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>I LOVE YOU ❤️</h1>
    <p>Forever yours 💖</p>
  </div>
</body>
</html>
